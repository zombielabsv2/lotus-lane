name: Daimoku Daily — Send Emails

on:
  schedule:
    # 5:30 AM UTC = 11:00 AM IST
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual sending)'
        required: false
        type: boolean
        default: false

jobs:
  send-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lotus-lane
        uses: actions/checkout@v4

      - name: Checkout nichiren-chatbot (knowledge base)
        uses: actions/checkout@v4
        with:
          repository: zombielabsv2/nichiren-chatbot
          path: nichiren-chatbot
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Send Daimoku Daily emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CHUNKS_PATH: nichiren-chatbot/data/processed/chunks.json
        run: python pipeline/generate_email.py
