name: Generate Daily Listicle

on:
  # Cron disabled 2026-04-27: consolidated into daily-content.yml.
  # workflow_dispatch retained as a temporary rollback hook.
  # schedule:
  #   - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: 'Force a specific theme (optional, e.g. courage, hope, perseverance)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install Pillow httpx playwright
          playwright install chromium --with-deps

      - name: Generate listicle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.theme }}" ]; then
            python pipeline/generate_listicle.py --theme "${{ inputs.theme }}"
          else
            python pipeline/generate_listicle.py
          fi

      - name: Regenerate sitemap
        run: python pipeline/generate_pages.py

      - name: Inject GA4 tag into newly-generated pages
        run: python pipeline/patch_ga4.py

      - name: Commit and push
        run: |
          git config user.name "lotus-lane-bot"
          git config user.email "bot@thelotuslane.in"
          git add listicles/ sitemap.xml feed.xml strips/*.html index.html subscribe.html
          if git diff --staged --quiet; then
            echo "No new listicle to commit"
          else
            git commit -m "daily listicle: $(date -u +%Y-%m-%d)"
            # Clean unstaged changes so rebase doesn't fail
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            git pull --rebase origin main
            git push
          fi
