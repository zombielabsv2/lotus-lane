name: Generate Daily Listicle

on:
  schedule:
    # 1:00 AM UTC = 6:30 AM IST
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: 'Force a specific theme (optional, e.g. courage, hope, perseverance)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow httpx

      - name: Generate listicle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.theme }}" ]; then
            python pipeline/generate_listicle.py --theme "${{ inputs.theme }}"
          else
            python pipeline/generate_listicle.py
          fi

      - name: Regenerate sitemap
        run: python pipeline/generate_pages.py

      - name: Commit and push
        run: |
          git config user.name "lotus-lane-bot"
          git config user.email "bot@thelotuslane.in"
          git add listicles/ sitemap.xml
          if git diff --staged --quiet; then
            echo "No new listicle to commit"
          else
            git commit -m "daily listicle: $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
