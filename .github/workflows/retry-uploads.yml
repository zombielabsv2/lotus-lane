name: Retry Pending YouTube Uploads

on:
  schedule:
    # Run daily at 2 AM UTC (7:30 AM IST) until all are uploaded
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Upload pending videos
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python pipeline/youtube_upload.py --all

      - name: Push updated strips.json
        run: |
          git config user.name "Lotus Lane Bot"
          git config user.email "bot@thelotus.lane"
          git add strips.json
          if git diff --staged --quiet; then
            echo "No new uploads"
          else
            git commit -m "Auto-link YouTube IDs for newly uploaded shorts"
            git push
          fi

      - name: Alert on failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python -c "
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText('YouTube upload retry failed. Check: https://github.com/zombielabsv2/lotus-lane/actions')
          msg['Subject'] = 'Lotus Lane: YouTube upload retry FAILED'
          msg['From'] = os.environ['GMAIL_ADDRESS']
          msg['To'] = os.environ['NOTIFY_EMAIL']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_ADDRESS'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
