name: Generate Daily Quote Card

on:
  schedule:
    # 0:00 AM UTC = 5:30 AM IST — before the morning WhatsApp rush
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: 'Force a specific theme (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate quote card
        run: |
          if [ -n "${{ inputs.theme }}" ]; then
            python pipeline/generate_quote_card.py --theme "${{ inputs.theme }}"
          else
            python pipeline/generate_quote_card.py
          fi

      - name: Commit and push
        run: |
          git config user.name "lotus-lane-bot"
          git config user.email "bot@thelotuslane.in"
          git add cards/
          if git diff --staged --quiet; then
            echo "No new card to commit"
          else
            git commit -m "daily quote card: $(date -u +%Y-%m-%d)"
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            git pull --rebase origin main
            git push
          fi
