name: Generate Lotus Lane Strip

on:
  push:
    branches: [main]
  schedule:
    # 6 AM UTC on Mon, Wed, Fri (11:30 AM IST)
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Force a specific topic (optional)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (script only, no images)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: strips-json-writer
  cancel-in-progress: false

jobs:
  generate:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          playwright install chromium --with-deps
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Generate strip
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS=()
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            ARGS+=(--topic "$TOPIC")
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS+=(--dry-run)
          fi
          python pipeline/generate_strip.py "${ARGS[@]}"

      # --- Push strip PNG to assets CDN repo ---
      - name: Push PNG to assets repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          DATE=$(date +%Y-%m-%d)
          PNG_FILE="strips/${DATE}.png"
          if [ ! -f "$PNG_FILE" ]; then
            echo "No PNG generated for $DATE, skipping assets push"
            exit 0
          fi
          cd /tmp
          git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/zombielabsv2/lotus-lane-assets.git
          cp "$GITHUB_WORKSPACE/$PNG_FILE" lotus-lane-assets/
          cd lotus-lane-assets
          git config user.name "Lotus Lane Bot"
          git config user.email "bot@thelotus.lane"
          git add "${DATE}.png"
          git commit -m "Add strip ${DATE}"
          git push
          echo "Pushed ${DATE}.png to assets repo"

      # --- Core: commit strip to site FIRST, before any optional steps ---
      - name: Generate strip SEO page
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python pipeline/generate_pages.py

      - name: Generate affliction landing pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python pipeline/generate_affliction_pages.py

      - name: Verify data integrity
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python pipeline/verify_integrity.py

      - name: Commit and push new strip
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Lotus Lane Bot"
          git config user.email "bot@thelotus.lane"
          git add strips/*.html strips.json sitemap.xml feed.xml index.html subscribe.html wisdom/
          if git diff --staged --quiet; then
            echo "No new changes to commit"
          else
            git commit -m "Add strip for $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      # --- Optional enrichment: video + social (all continue-on-error) ---
      - name: Generate YouTube Short video
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        id: video
        run: python pipeline/video_generator.py --date $(date +%Y-%m-%d)

      - name: Upload to YouTube
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        id: youtube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python pipeline/youtube_upload.py --latest

      # --- Pinterest, Tumblr, Instagram DISABLED (no credentials configured, generates noise) ---
      # Re-enable when credentials are set up. workflow_dispatch still works for manual testing.
      # - name: Pin to Pinterest
      #   if: ${{ github.event.inputs.dry_run != 'true' }}
      #   continue-on-error: true
      #   id: pinterest
      #   env:
      #     PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
      #     PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
      #     PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
      #     PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
      #     PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
      #   run: python pipeline/pinterest_upload.py --latest

      # - name: Post to Tumblr
      #   if: ${{ github.event.inputs.dry_run != 'true' }}
      #   continue-on-error: true
      #   id: tumblr
      #   env:
      #     TUMBLR_ACCESS_TOKEN: ${{ secrets.TUMBLR_ACCESS_TOKEN }}
      #     TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
      #     TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
      #     TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
      #   run: python pipeline/tumblr_upload.py --latest

      # - name: Post to Instagram
      #   if: ${{ github.event.inputs.dry_run != 'true' }}
      #   continue-on-error: true
      #   id: instagram
      #   env:
      #     INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      #     INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      #   run: python pipeline/instagram_upload.py --latest

      - name: Commit video and social media IDs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        id: commit_social
        run: |
          git pull --rebase || true
          git add strips.json shorts/
          if git diff --staged --quiet; then
            echo "No video/social updates"
          else
            git commit -m "Update video + social media IDs for $(date +%Y-%m-%d)"
            git push
          fi

      - name: Send notifications (WhatsApp reminder + content subscribers)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        id: notify
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pipeline/notify.py

      - name: Report failure summary
        if: ${{ github.event.inputs.dry_run != 'true' && always() }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          FAILURES=""
          if [ "${{ steps.video.outcome }}" == "failure" ]; then FAILURES="$FAILURES- Video generation FAILED\n"; fi
          if [ "${{ steps.youtube.outcome }}" == "failure" ]; then FAILURES="$FAILURES- YouTube upload FAILED\n"; fi
          # Pinterest, Tumblr, Instagram checks removed — steps disabled
          if [ "${{ steps.commit_social.outcome }}" == "failure" ]; then FAILURES="$FAILURES- Social ID commit FAILED\n"; fi
          if [ "${{ steps.notify.outcome }}" == "failure" ]; then FAILURES="$FAILURES- Notifications FAILED\n"; fi

          if [ -n "$FAILURES" ]; then
            echo "## Lotus Lane Pipeline Failures" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo -e "$FAILURES" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

            # Send failure alert email via Resend if configured
            if [ -n "$RESEND_API_KEY" ] && [ -n "$NOTIFY_EMAIL" ]; then
              export FAIL_TEXT=$(echo -e "$FAILURES")
              export RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              python pipeline/send_failure_alert.py
            fi
          else
            echo "All pipeline steps succeeded." >> $GITHUB_STEP_SUMMARY
          fi
