name: Generate Podcast Episode

on:
  schedule:
    # 5:30 UTC = 11:00 IST daily — matches existing daily cadence
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      slug:
        description: "Specific wisdom slug to generate (leave blank for next-unpublished)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — skip TTS, upload, DB write"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        working-directory: pipeline
        run: |
          pip install -r requirements.txt

      - name: Auth to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate episode
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            ARGS="--slug ${{ github.event.inputs.slug }}"
          else
            ARGS="--pick-next"
          fi
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            ARGS="$ARGS --live"
          fi
          python pipeline/generate_podcast.py $ARGS

      - name: Regenerate RSS feed
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          python pipeline/generate_podcast_feed.py

      - name: Commit feed update
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet podcast.xml; then
            echo "No feed changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add podcast.xml
          git commit -m "feed: new episode (auto)"
          git pull --rebase --autostash origin main
          git push

      - name: Notify (WhatsApp copy-paste email)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          PYTHONIOENCODING: utf-8
        run: |
          python pipeline/notify.py --podcast
