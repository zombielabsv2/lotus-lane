<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listicles — Ikeda Quotes for Life's Toughest Moments | The Lotus Lane</title>
  <meta name="description" content="Daily listicles of Daisaku Ikeda's most powerful quotes, curated by theme. Courage, hope, perseverance, and more — shareable wisdom for everyday struggles.">
  <link rel="canonical" href="https://thelotuslane.in/listicles/">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Listicles — Ikeda Quotes for Life's Toughest Moments">
  <meta property="og:description" content="Daily listicles of Ikeda Sensei's most powerful quotes, curated by theme.">
  <meta property="og:url" content="https://thelotuslane.in/listicles/">
  <meta property="og:site_name" content="The Lotus Lane">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #faf9f6; color: #2d2d2d; }

    header {
      text-align: center; padding: 1.5rem 1rem 0.8rem;
      border-bottom: 2px solid #e8e4de;
    }
    header h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: 0.15em; color: #4a4a4a; }
    header h1 a { text-decoration: none; color: inherit; }
    header h1 span { font-weight: 600; color: #c0392b; }

    .hero {
      max-width: 800px; margin: 2rem auto 1.5rem; padding: 0 1.5rem; text-align: center;
    }
    .hero h2 { font-size: 1.5rem; font-weight: 600; color: #333; margin-bottom: 0.5rem; }
    .hero p { font-size: 0.95rem; color: #666; line-height: 1.6; }

    .listicles-grid {
      max-width: 800px; margin: 0 auto; padding: 0 1.5rem 2rem;
    }

    .listicle-card {
      display: flex; gap: 1rem; align-items: flex-start;
      background: white; border-radius: 12px; padding: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      margin-bottom: 1rem; text-decoration: none; color: inherit;
      border: 1.5px solid transparent; transition: all 0.2s;
    }
    .listicle-card:hover {
      border-color: #c0392b; transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .listicle-thumb {
      width: 80px; height: 140px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; background: #f0ede8;
    }

    .listicle-info { flex: 1; }
    .listicle-info h3 { font-size: 1rem; color: #333; margin-bottom: 0.3rem; line-height: 1.4; }
    .listicle-info .meta { font-size: 0.78rem; color: #999; margin-bottom: 0.4rem; }
    .listicle-info .preview { font-size: 0.85rem; color: #666; line-height: 1.5; font-style: italic; }

    .empty { text-align: center; padding: 4rem 2rem; color: #aaa; }

    footer {
      text-align: center; padding: 1.5rem 1rem; font-size: 0.75rem; color: #bbb;
      border-top: 1px solid #e8e4de; margin-top: 1rem;
    }
    footer a { color: #c0392b; text-decoration: none; }

    @media (max-width: 600px) {
      .listicle-card { flex-direction: column; }
      .listicle-thumb { width: 100%; height: 200px; }
    }
  </style>

  <script data-goatcounter="https://zombielabs.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <script src="../nav.js" defer></script>
</head>
<body>
  <header>
    <h1><a href="../">The <span>Lotus</span> Lane</a></h1>
  </header>

  <div class="hero">
    <h2>Listicles</h2>
    <p>Daily curated lists of Daisaku Ikeda's most powerful quotes — one theme at a time, designed to share.</p>
  </div>

  <div class="listicles-grid" id="grid"></div>

  <footer>
    <p>Curated by <a href="../">The Lotus Lane</a></p>
  </footer>

  <script>
    async function init() {
      const resp = await fetch('listicles.json');
      const listicles = await resp.json();
      listicles.sort((a, b) => new Date(b.date) - new Date(a.date));

      const grid = document.getElementById('grid');
      if (listicles.length === 0) {
        grid.innerHTML = '<div class="empty"><h3>Coming soon</h3><p>First listicle is on its way.</p></div>';
        return;
      }

      grid.innerHTML = listicles.map(l => {
        const dt = new Date(l.date + 'T00:00:00');
        const dateStr = dt.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
        const preview = l.items && l.items[0] ? l.items[0].quote.substring(0, 100) + '...' : '';
        return `
          <a href="${l.date}.html" class="listicle-card">
            <img src="${l.date}.png" alt="${l.title}" class="listicle-thumb" loading="lazy">
            <div class="listicle-info">
              <h3>${l.title}</h3>
              <div class="meta">${dateStr} · ${l.theme_name}</div>
              <div class="preview">"${preview}"</div>
            </div>
          </a>`;
      }).join('');
    }
    init();
  </script>
</body>
</html>
